<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>记忆面板</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <p class="eyebrow">AstrBot</p>
        <h1>记忆面板</h1>
        <p class="subtle">查看、修改认人记忆、偏好、关系、习惯与事件回忆</p>
      </div>

      <div class="search-card">
        <label for="user-search">搜索用户</label>
        <input id="user-search" type="search" placeholder="QQ / 别名 / 平台昵称 / 备注">
      </div>

      <div id="stats-grid" class="stats-grid"></div>

      <div class="user-list-card">
        <div class="section-title">
          <span>用户列表</span>
          <button id="refresh-users" class="ghost-btn">刷新</button>
        </div>
        <div id="user-list" class="user-list"></div>
      </div>
    </aside>

    <main class="content">
      <section id="empty-state" class="empty-state">
        <div>
          <p class="eyebrow">记忆中心</p>
          <h2>先从左侧选一个用户</h2>
          <p>选中后可以直接编辑人物档案、偏好、关系边、跨模块习惯，以及被动记录下来的事件回忆。</p>
        </div>
      </section>

      <section id="detail-view" class="detail-view hidden">
        <div class="hero-card">
          <div>
            <p class="eyebrow">人物档案</p>
            <h2 id="hero-title">-</h2>
            <p id="hero-subtitle" class="subtle">-</p>
          </div>
          <div class="hero-meta">
            <span id="hero-last-seen" class="pill">最近出现: -</span>
            <span id="hero-updated" class="pill">最近更新: -</span>
          </div>
        </div>

        <section class="panel">
          <div class="section-title"><span>基础资料</span></div>
          <form id="profile-form" class="form-grid">
            <label>当前平台昵称<input name="platform_name" type="text" placeholder="当前在平台上显示的昵称"></label>
            <label class="wide">备注<textarea name="note" rows="3" placeholder="例如：初中同学 / 常聊基金 / 工作搭子"></textarea></label>
            <div class="form-actions wide">
              <button type="submit" class="primary-btn">保存资料</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="section-title"><span>认人记忆</span></div>
          <p class="subtle">全局别名适用于所有场景；场景别名可指定某个群或私聊里的专属称呼。</p>
          <div class="section-title"><span>全局别名</span></div>
          <div id="alias-list" class="chip-row"></div>
          <div class="section-title"><span>场景别名</span></div>
          <div id="scoped-alias-list" class="editable-list"></div>
          <form id="alias-form" class="form-grid compact-grid">
            <label>称呼<input name="alias" type="text" placeholder="例如：阿周 / 宝宝 / 老张"></label>
            <label>生效范围
              <select id="alias-scene-type" name="scene_type"></select>
            </label>
            <label id="alias-scene-value-wrap">群号<input id="alias-scene-value" name="scene_value" type="text" placeholder="仅群聊场景需要填写"></label>
            <div class="form-actions wide">
              <button type="submit" class="primary-btn">新增认人称呼</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="section-title"><span>偏好记忆</span></div>
          <div id="preferences-list" class="editable-list"></div>
          <form id="preference-form" class="form-grid compact-grid">
            <label>类型
              <select name="preference_type" id="preference-type-select"></select>
            </label>
            <label>内容<input name="value" type="text" placeholder="例如：抹茶 / 小周"></label>
            <label>置信度<input name="confidence" type="number" step="0.01" min="0" max="1" value="0.82"></label>
            <label class="wide">来源说明<input name="source_text" type="text" value="记忆面板手动录入" placeholder="例如：管理员手动补录"></label>
            <div class="form-actions wide">
              <button type="submit" class="primary-btn">新增偏好</button>
            </div>
          </form>
        </section>

        <section class="split-grid">
          <section class="panel">
            <div class="section-title"><span>节点关系图谱</span></div>
            <div id="graph-canvas" class="graph-canvas"></div>
          </section>

          <section class="panel">
            <div class="section-title"><span>关系边</span></div>
            <div id="relations-list" class="editable-list"></div>
            <form id="relation-form" class="form-grid compact-grid">
              <label>关系对象
                <select id="relation-target-qq-id" name="target_qq_id"></select>
              </label>
              <label>关系
                <select id="relation-type-select" name="relation_type"></select>
              </label>
              <label>置信度<input name="confidence" type="number" step="0.01" min="0" max="1" value="0.84"></label>
              <label class="wide">备注<input name="note" type="text" placeholder="可选备注"></label>
              <label class="wide">来源说明<input name="source_text" type="text" value="记忆面板手动录入" placeholder="例如：管理员手动补录"></label>
              <div class="form-actions wide">
                <button type="submit" class="primary-btn">新增关系</button>
              </div>
            </form>
          </section>
        </section>

        <section class="panel">
          <div class="section-title"><span>跨模块习惯记忆</span></div>
          <div id="habits-list" class="editable-list"></div>
          <form id="habit-form" class="form-grid compact-grid">
            <label>模块
              <select id="habit-module-select" name="module_name"></select>
            </label>
            <label>习惯类型
              <select id="habit-key-select" name="habit_key"></select>
            </label>
            <label>内容值<input name="habit_value" type="text" placeholder="例如：上海 / 600519 / 08:30"></label>
            <label class="wide">来源说明<input name="source_text" type="text" value="记忆面板手动录入" placeholder="例如：管理员手动补录"></label>
            <div class="form-actions wide">
              <button type="submit" class="primary-btn">新增习惯</button>
            </div>
          </form>
        </section>

        <section class="split-grid">
          <section class="panel">
            <div class="section-title"><span>账本记录</span></div>
            <div id="bookkeeping-summary" class="insight-grid"></div>
            <div id="bookkeeping-list" class="editable-list"></div>
            <form id="bookkeeping-form" class="form-grid compact-grid">
              <label>类型
                <select id="bookkeeping-type-select" name="record_type"></select>
              </label>
              <label>分类<input name="category" type="text" placeholder="例如：餐饮 / 工资 / 购物"></label>
              <label>金额<input name="amount" type="number" step="0.01" min="0" placeholder="例如：88.50"></label>
              <label>记录时间<input name="created_at" type="text" placeholder="YYYY-MM-DD HH:MM:SS"></label>
              <label class="wide">备注<input name="description" type="text" placeholder="可选，补充说明这条账单"></label>
              <div class="form-actions wide">
                <button type="submit" class="primary-btn">新增账本记录</button>
              </div>
            </form>
          </section>

          <section class="panel">
            <div class="section-title"><span>提醒管理</span></div>
            <div id="reminder-summary" class="insight-grid"></div>
            <div class="section-title"><span>待执行提醒</span></div>
            <div id="reminders-list" class="editable-list"></div>
            <form id="reminder-form" class="form-grid compact-grid">
              <label>会话 ID<input name="session_id" type="text" placeholder="用于投递提醒的 unified_msg_origin"></label>
              <label>触发时间<input name="run_at" type="text" placeholder="YYYY-MM-DD HH:MM:SS"></label>
              <label class="wide">提醒内容<input name="text" type="text" placeholder="例如：提醒我开会 / 喝水 / 看盘"></label>
              <div class="form-actions wide">
                <button type="submit" class="primary-btn">新增提醒</button>
              </div>
            </form>

            <div class="section-title"><span>提醒历史</span></div>
            <div id="reminder-history-list" class="timeline-list"></div>
          </section>
        </section>

        <section class="panel">
          <div class="section-title"><span>事件回忆</span></div>
          <div id="events-list" class="timeline-list"></div>
          <form id="event-form" class="form-grid compact-grid">
            <label>时间标签<input name="event_date_label" type="text" placeholder="例如：昨天 / 上周 / 春节前"></label>
            <label class="wide">事件摘要<input name="summary" type="text" placeholder="例如：昨天和小王去看了电影"></label>
            <label>置信度<input name="confidence" type="number" step="0.01" min="0" max="1" value="0.82"></label>
            <label class="wide">来源说明<input name="source_text" type="text" value="记忆面板手动录入" placeholder="例如：管理员手动补录"></label>
            <div class="form-actions wide">
              <button type="submit" class="primary-btn">新增事件</button>
            </div>
          </form>
        </section>
      </section>
    </main>
  </div>

  <template id="empty-list-template">
    <div class="empty-list">还没有记录</div>
  </template>

  <script src="/static/app.js"></script>
</body>
</html>
